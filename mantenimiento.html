<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios de Mantenimiento de Celulares</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px 0;
        }
        h1, h2 {
            color: #0056b3;
        }
        .services-list {
            list-style: none;
            padding: 0;
        }
        .services-list li {
            margin-bottom: 20px;
        }
        .location-button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Servicios de Mantenimiento de Celulares</h1>
        <ul class="services-list">
            <li>Reparación de pantalla</li>
            <li>Cambio de batería</li>
            <li>Limpieza interna</li>
            <li>Actualización de software</li>
            <li>Recuperación de datos</li>
        </ul>
        <a href="https://www.google.com/maps/search/instituto+tecnico+britanico+mercantil+ibm/@-17.3968599,-66.2790463,21z?hl=es&entry=ttu&g_ep=EgoyMDI1MDMwOC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="location-button">Ver ubicación en Google Maps</a>
    </div>
</body>
</html>
