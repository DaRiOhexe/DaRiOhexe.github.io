<!DOCTYPE html>
<html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width initial-scale=1.0">
<head>
	<title>Carreras</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <style>
        /* Estilos personalizados */
        .custom-carousel {
            max-width: 1200px;  /* Ancho máximo del carrusel */
            margin: 20px auto;  /* Centrar el carrusel */
        }
        
        .carousel-inner {
            border-radius: 15px;  /* Bordes redondeados */
            overflow: hidden;     /* Esconde el exceso de imagen */
        }

        .carousel-item img {
            height: 500px;       /* Altura fija */
            object-fit: cover;   /* Ajusta la imagen sin deformar */
            object-position: center; /* Centra la imagen */
        }

        @media (max-width: 768px) {
            .carousel-item img {
                height: 300px;   /* Altura menor para móviles */
            }
        }
    </style>
</head>
<body>
    <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
          <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="3" aria-label="Slide 4"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="../pagina IBM/img/sistemas.png" class="d-block w-100" alt="100">
            <div class="carousel-caption d-none d-md-block">
              <h5>Sistemas</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img src="../pagina IBM/img/Enfermeria.png" class="d-block w-100" alt="100">
            <div class="carousel-caption d-none d-md-block">
              <h5>Enfermeria</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img src="../pagina IBM/img/Secretariado.png" class="d-block w-100" alt="100">
            <div class="carousel-caption d-none d-md-block">
              <h5>Secretariado</h5>
            </div>
          </div>
          <div class="carousel-item">
            <img src="../pagina IBM/img/mercadotecnia.png" class="d-block w-100" alt="100">
            <div class="carousel-caption d-none d-md-block">
              <h5>Mercadotecnia</h5>
            </div>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Siguiente</span>
        </button>
      </div>
</body>
